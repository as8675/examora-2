services:
  backend:
    build: ./backend
    container_name: examora-backend-service
    ports:
      - "3000:3000" # MATCHES server.js app.listen(3000)
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: examora-frontend-service
    ports:
      - "8080:8080" # MATCHES vite.config.ts port: 8080
    depends_on:
      - backend
    environment:
      # MATCHES the variable expected in AuthPage.tsx
      - VITE_API_BASE_URL=http://backend:3000/auth
    restart: unless-stopped
